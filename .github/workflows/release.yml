name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: read

jobs:
  desktop:
    name: Desktop (${{ matrix.name }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Windows
            runner: windows-latest
            target: --win nsis
            artifact: echo-windows
            files: electron/dist/*.exe
          - name: Ubuntu
            runner: ubuntu-latest
            target: --linux AppImage deb
            artifact: echo-ubuntu
            files: |
              electron/dist/*.AppImage
              electron/dist/*.deb
    defaults:
      run:
        shell: bash
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            client/package-lock.json
            electron/package-lock.json

      - name: Set release version
        env:
          RELEASE_VERSION: ${{ github.ref_name }}
        run: npm --prefix electron version "${RELEASE_VERSION#v}" --no-git-tag-version --allow-same-version

      - name: Install client dependencies
        working-directory: client
        run: npm ci

      - name: Install Electron dependencies
        working-directory: electron
        run: npm ci

      - name: Build desktop client
        env:
          ELECTRON_BUILD: "1"
        working-directory: client
        run: npm run build

      - name: Package desktop application
        working-directory: electron
        run: npx electron-builder ${{ matrix.target }} --publish never

      - name: Upload desktop packages
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.files }}
          if-no-files-found: error

  docker:
    name: Docker (${{ matrix.component }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        component:
          - client
          - server
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Generate image metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ vars.DOCKERHUB_USERNAME }}/echo-${{ matrix.component }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable=${{ !contains(github.ref_name, '-') }}

      - name: Build and push image
        uses: docker/build-push-action@v7
        with:
          context: ./${{ matrix.component }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.component }}
          cache-to: type=gha,mode=max,scope=${{ matrix.component }}
          provenance: true
          sbom: true

  release:
    name: GitHub Release
    runs-on: ubuntu-latest
    needs:
      - desktop
      - docker
    permissions:
      contents: write
    steps:
      - name: Download desktop packages
        uses: actions/download-artifact@v5
        with:
          pattern: echo-*
          path: release-assets
          merge-multiple: true

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: gh release create "${GITHUB_REF_NAME}" release-assets/* --verify-tag --generate-notes --title "Echo ${GITHUB_REF_NAME}"
