services:
  mongo:
    image: mongo:7
    restart: unless-stopped
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Self-hosted, S3-compatible object storage for file uploads. Fully
  # air-gapped: nothing leaves the Docker network at runtime.
  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data
    environment:
      - MINIO_ROOT_USER=${MINIO_ROOT_USER:-echo}
      - MINIO_ROOT_PASSWORD=${MINIO_ROOT_PASSWORD:-echo-dev-secret}
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5

  server:
    build: ./server
    container_name: echo-server
    restart: unless-stopped
    environment:
      - PORT=4000
      - MONGO_URI=mongodb://mongo:27017/echo
      - JWT_SECRET=${JWT_SECRET:?JWT_SECRET env var must be set}
      - CLIENT_ORIGIN=http://localhost:8090
      - S3_ENDPOINT=http://minio:9000
      - S3_ACCESS_KEY=${MINIO_ROOT_USER:-echo}
      - S3_SECRET_KEY=${MINIO_ROOT_PASSWORD:-echo-dev-secret}
      - S3_BUCKET=echo-uploads
    depends_on:
      mongo:
        condition: service_healthy
      minio:
        condition: service_healthy

  client:
    build: ./client
    container_name: echo-client
    restart: unless-stopped
    ports:
      - "8090:80"
    depends_on:
      - server

volumes:
  mongo-data:
  minio-data:
