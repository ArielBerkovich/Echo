apiVersion: v2
name: echo
description: Echo self-hosted team chat platform.
type: application
version: 0.4.1
appVersion: "0.4.0"
keywords:
  - chat
  - collaboration
  - mongodb
  - minio
dependencies:
  # MongoDB's vendor-maintained database chart is the Bitnami MongoDB chart.
  - name: mongodb
    version: 19.1.17
    repository: https://charts.bitnami.com/bitnami
    condition: mongodb.enabled
  # Official MinIO chart repository.
  - name: minio
    version: 5.4.0
    repository: https://charts.min.io
    condition: minio.enabled
