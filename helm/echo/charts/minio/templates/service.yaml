{{- if .Values.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "minio.serviceName" . }}
  labels:
    {{- include "minio.labels" . | nindent 4 }}
    app.kubernetes.io/component: minio
spec:
  type: ClusterIP
  ports:
    - name: api
      port: {{ .Values.service.apiPort }}
      targetPort: api
    - name: console
      port: {{ .Values.service.consolePort }}
      targetPort: console
  selector:
    {{- include "minio.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: minio
{{- end }}
