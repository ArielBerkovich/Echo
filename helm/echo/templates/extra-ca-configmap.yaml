{{- if and .Values.rhsso.enabled .Values.rhsso.createMockExtraCaCert (not .Values.rhsso.extraCaCertConfigMap) }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "echo.fullname" . }}-extra-ca
  labels:
    {{- include "echo.labels" . | nindent 4 }}
    app.kubernetes.io/component: server
data:
  extra-ca.pem: |
    -----BEGIN CERTIFICATE-----
    # MOCK CA CERTIFICATE - FOR DEVELOPMENT/TESTING USE ONLY
    # This is a dummy certificate placeholder generated by the Echo chart.
    # Replace this with your actual Keycloak/RHSSO CA certificate.
    MIIDBTCCAe2gAwIBAgIUd5zGgT...MOCK...CERTIFICATE...DATA...
    -----END CERTIFICATE-----
{{- end }}
