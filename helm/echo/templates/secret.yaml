apiVersion: v1
kind: Secret
metadata:
  name: {{ include "echo.secretName" . }}
  labels:
    {{- include "echo.labels" . | nindent 4 }}
type: Opaque
stringData:
  {{- $existing := lookup "v1" "Secret" .Release.Namespace (include "echo.secretName" .) -}}
  {{- $jwt := .Values.server.jwtSecret -}}
  {{- if not $jwt }}{{- if $existing }}{{- $jwt = index $existing.data "jwt-secret" | b64dec }}{{- else }}{{- $jwt = randAlphaNum 48 }}{{- end }}{{- end }}
  jwt-secret: {{ $jwt | quote }}
