{{- $secretName := include "echo.secretName" . -}}
{{- $existing := lookup "v1" "Secret" .Release.Namespace $secretName -}}
{{- $jwtSecret := .Values.server.jwtSecret -}}
{{- if not $jwtSecret -}}
  {{- if $existing -}}
    {{- $jwtSecret = index $existing.data "jwt-secret" | b64dec -}}
  {{- else -}}
    {{- $jwtSecret = randAlphaNum 48 -}}
  {{- end -}}
{{- end -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $secretName }}
  labels:
    {{- include "echo.labels" . | nindent 4 }}
type: Opaque
stringData:
  jwt-secret: {{ $jwtSecret | quote }}
  minio-root-user: {{ .Values.minio.rootUser | quote }}
  minio-root-password: {{ .Values.minio.rootPassword | quote }}
