{{- if .Values.mongodb.enabled }}
{{- $mongodbSecretName := required "mongodb.auth.existingSecret is required when mongodb.enabled is true" .Values.mongodb.auth.existingSecret -}}
{{- $existingMongoSecret := lookup "v1" "Secret" .Release.Namespace $mongodbSecretName -}}
{{- $mongodbRootPassword := .Values.mongodb.auth.rootPassword -}}
{{- $mongodbReplicaSetKey := .Values.mongodb.auth.replicaSetKey -}}
{{- if empty $mongodbRootPassword -}}
  {{- $stored := dig "data" "mongodb-root-password" "" (default dict $existingMongoSecret) -}}
  {{- if $stored }}{{- $mongodbRootPassword = ($stored | b64dec) -}}{{- end -}}
{{- end -}}
{{- if empty $mongodbReplicaSetKey -}}
  {{- $stored := dig "data" "mongodb-replica-set-key" "" (default dict $existingMongoSecret) -}}
  {{- if $stored }}{{- $mongodbReplicaSetKey = ($stored | b64dec) -}}{{- end -}}
{{- end -}}
{{- if empty $mongodbRootPassword }}{{- $mongodbRootPassword = randAlphaNum 32 -}}{{- end -}}
{{- if empty $mongodbReplicaSetKey }}{{- $mongodbReplicaSetKey = randAlphaNum 32 -}}{{- end -}}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ $mongodbSecretName }}
  labels:
    {{- include "echo.labels" . | nindent 4 }}
    app.kubernetes.io/component: mongodb
  annotations:
    "helm.sh/hook": pre-install
    "helm.sh/hook-weight": "-10"
    "helm.sh/hook-delete-policy": before-hook-creation
type: Opaque
stringData:
  mongodb-root-password: {{ $mongodbRootPassword | quote }}
  mongodb-replica-set-key: {{ $mongodbReplicaSetKey | quote }}
{{ end }}
{{- if .Values.minio.enabled }}
{{- $minioSecretName := required "minio.existingSecret is required when minio.enabled is true" .Values.minio.existingSecret -}}
{{- $existingMinioSecret := lookup "v1" "Secret" .Release.Namespace $minioSecretName -}}
{{- $minioRootUser := .Values.minio.rootUser -}}
{{- $minioRootPassword := .Values.minio.rootPassword -}}
{{- if empty $minioRootUser -}}
  {{- $stored := dig "data" "rootUser" "" (default dict $existingMinioSecret) -}}
  {{- if $stored }}{{- $minioRootUser = ($stored | b64dec) -}}{{- end -}}
{{- end -}}
{{- if empty $minioRootPassword -}}
  {{- $stored := dig "data" "rootPassword" "" (default dict $existingMinioSecret) -}}
  {{- if $stored }}{{- $minioRootPassword = ($stored | b64dec) -}}{{- end -}}
{{- end -}}
{{- if empty $minioRootUser }}{{- $minioRootUser = randAlphaNum 16 -}}{{- end -}}
{{- if empty $minioRootPassword }}{{- $minioRootPassword = randAlphaNum 32 -}}{{- end -}}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ $minioSecretName }}
  labels:
    {{- include "echo.labels" . | nindent 4 }}
    app.kubernetes.io/component: minio
  annotations:
    "helm.sh/hook": pre-install
    "helm.sh/hook-weight": "-10"
    "helm.sh/hook-delete-policy": before-hook-creation
type: Opaque
stringData:
  # These key names are required by the official MinIO chart.
  rootUser: {{ $minioRootUser | quote }}
  rootPassword: {{ $minioRootPassword | quote }}
{{ end }}
{{- $serverSecretName := include "echo.secretName" . -}}
{{- $existingServerSecret := lookup "v1" "Secret" .Release.Namespace $serverSecretName -}}
{{- $jwtSecret := .Values.server.jwtSecret -}}
{{- if empty $jwtSecret -}}
  {{- $stored := dig "data" "jwt-secret" "" (default dict $existingServerSecret) -}}
  {{- if $stored }}{{- $jwtSecret = ($stored | b64dec) -}}{{- end -}}
{{- end -}}
{{- if empty $jwtSecret }}{{- $jwtSecret = randAlphaNum 48 -}}{{- end -}}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ $serverSecretName }}
  labels:
    {{- include "echo.labels" . | nindent 4 }}
    app.kubernetes.io/component: server
  annotations:
    "helm.sh/hook": pre-install
    "helm.sh/hook-weight": "-10"
    "helm.sh/hook-delete-policy": before-hook-creation
type: Opaque
stringData:
  jwt-secret: {{ $jwtSecret | quote }}
  {{- if and .Values.rhsso.enabled .Values.rhsso.clientSecret }}
  rhsso-client-secret: {{ .Values.rhsso.clientSecret | quote }}
  {{- end }}
