{{- if .Values.mongodb.enabled }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ required "mongodb.auth.existingSecret is required when mongodb.enabled is true" .Values.mongodb.auth.existingSecret }}
  labels:
    {{- include "echo.labels" . | nindent 4 }}
    app.kubernetes.io/component: mongodb
  annotations:
    "helm.sh/hook": pre-install
    "helm.sh/hook-weight": "-10"
    "helm.sh/hook-delete-policy": before-hook-creation
type: Opaque
stringData:
  mongodb-root-password: {{ default (randAlphaNum 32) .Values.mongodb.auth.rootPassword | quote }}
  mongodb-replica-set-key: {{ default (randAlphaNum 32) .Values.mongodb.auth.replicaSetKey | quote }}
---
{{- end }}
{{- if .Values.minio.enabled }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ required "minio.existingSecret is required when minio.enabled is true" .Values.minio.existingSecret }}
  labels:
    {{- include "echo.labels" . | nindent 4 }}
    app.kubernetes.io/component: minio
  annotations:
    "helm.sh/hook": pre-install
    "helm.sh/hook-weight": "-10"
    "helm.sh/hook-delete-policy": before-hook-creation
type: Opaque
stringData:
  # These key names are required by the official MinIO chart.
  rootUser: {{ default (randAlphaNum 16) .Values.minio.rootUser | quote }}
  rootPassword: {{ default (randAlphaNum 32) .Values.minio.rootPassword | quote }}
---
{{- end }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "echo.secretName" . }}
  labels:
    {{- include "echo.labels" . | nindent 4 }}
    app.kubernetes.io/component: server
  annotations:
    "helm.sh/hook": pre-install
    "helm.sh/hook-weight": "-10"
    "helm.sh/hook-delete-policy": before-hook-creation
type: Opaque
stringData:
  jwt-secret: {{ default (randAlphaNum 48) .Values.server.jwtSecret | quote }}
  {{- if and .Values.rhsso.enabled .Values.rhsso.clientSecret }}
  rhsso-client-secret: {{ .Values.rhsso.clientSecret | quote }}
  {{- end }}
