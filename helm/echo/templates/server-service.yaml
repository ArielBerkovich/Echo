apiVersion: v1
kind: Service
metadata:
  name: {{ include "echo.serverServiceName" . }}
  labels:
    {{- include "echo.labels" . | nindent 4 }}
    app.kubernetes.io/component: server
spec:
  type: {{ .Values.server.service.type }}
  ports:
    - name: http
      port: {{ .Values.server.service.port }}
      targetPort: http
  selector:
    {{- include "echo.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: server
