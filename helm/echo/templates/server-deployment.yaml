apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "echo.serverServiceName" . }}
  labels:
    {{- include "echo.labels" . | nindent 4 }}
    app.kubernetes.io/component: server
spec:
  replicas: {{ .Values.server.replicaCount }}
  selector:
    matchLabels:
      {{- include "echo.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: server
  template:
    metadata:
      labels:
        {{- include "echo.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: server
    spec:
      securityContext:
        {{- if .Values.openshift.enabled }}
        {{- toYaml .Values.openshift.podSecurityContext | nindent 8 }}
        {{- else }}
        {{- toYaml .Values.server.podSecurityContext | nindent 8 }}
        {{- end }}
      {{- with .Values.global.imagePullSecrets }}
      imagePullSecrets:
        {{- include "echo.imagePullSecrets" . | nindent 8 }}
      {{- end }}
      containers:
        - name: server
          image: {{ include "echo.image" (dict "registry" .Values.global.imageRegistry "repository" .Values.server.image.repository "tag" .Values.server.image.tag "digest" .Values.server.image.digest) }}
          imagePullPolicy: {{ .Values.server.image.pullPolicy }}
          securityContext:
            {{- if .Values.openshift.enabled }}
            {{- toYaml .Values.openshift.containerSecurityContext | nindent 12 }}
            {{- else }}
            {{- toYaml .Values.server.containerSecurityContext | nindent 12 }}
            {{- end }}
          ports:
            - name: http
              containerPort: {{ .Values.server.service.port }}
          env:
            - name: PORT
              value: {{ .Values.server.service.port | quote }}
            - name: MONGO_URI
              {{- if or .Values.server.mongoUri (not .Values.mongodb.enabled) }}
              value: {{ required "server.mongoUri is required when mongodb.enabled is false" .Values.server.mongoUri | quote }}
              {{- else }}
              value: ""
              {{- end }}
            {{- if and .Values.mongodb.enabled (not .Values.server.mongoUri) }}
            - name: MONGO_HOST
              value: {{ printf "%s-0.%s-headless" (include "echo.mongodbName" .) (include "echo.mongodbName" .) | quote }}
            - name: MONGO_USER
              value: {{ .Values.mongodb.auth.rootUser | quote }}
            - name: MONGO_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "echo.mongodbName" . }}
                  key: mongodb-root-password
            - name: MONGO_REPLICA_SET
              value: {{ .Values.mongodb.replicaSetName | quote }}
            {{- end }}
            - name: CLIENT_ORIGIN
              value: {{ include "echo.clientOrigin" . | quote }}
            - name: S3_ENDPOINT
              value: {{ include "echo.s3Endpoint" . | quote }}
            - name: S3_ACCESS_KEY
              {{- if .Values.minio.enabled }}
              valueFrom:
                secretKeyRef:
                  name: {{ include "echo.minioName" . }}
                  key: rootUser
              {{- else }}
              value: {{ required "server.s3.accessKey is required when minio.enabled is false" .Values.server.s3.accessKey | quote }}
              {{- end }}
            - name: S3_SECRET_KEY
              {{- if .Values.minio.enabled }}
              valueFrom:
                secretKeyRef:
                  name: {{ include "echo.minioName" . }}
                  key: rootPassword
              {{- else }}
              value: {{ required "server.s3.secretKey is required when minio.enabled is false" .Values.server.s3.secretKey | quote }}
              {{- end }}
            - name: S3_BUCKET
              value: {{ .Values.server.s3.bucket | quote }}
            - name: S3_REGION
              value: {{ .Values.server.s3.region | quote }}
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ include "echo.secretName" . }}
                  key: jwt-secret
            {{- with .Values.server.extraEnv }}{{ toYaml . | nindent 12 }}{{- end }}
          readinessProbe:
            httpGet: { path: /api/health, port: http }
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet: { path: /api/health, port: http }
            initialDelaySeconds: 30
            periodSeconds: 20
          resources: {{- toYaml .Values.server.resources | nindent 12 }}
