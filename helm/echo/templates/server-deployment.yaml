apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "echo.serverServiceName" . }}
  labels:
    {{- include "echo.labels" . | nindent 4 }}
    app.kubernetes.io/component: server
spec:
  replicas: {{ .Values.server.replicaCount }}
  selector:
    matchLabels:
      {{- include "echo.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: server
  template:
    metadata:
      labels:
        {{- include "echo.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: server
    spec:
      securityContext:
        {{- if .Values.openshift.enabled }}
        {{- toYaml .Values.openshift.podSecurityContext | nindent 8 }}
        {{- else }}
        {{- toYaml .Values.server.podSecurityContext | nindent 8 }}
        {{- end }}
      {{- with .Values.global.imagePullSecrets }}
      imagePullSecrets:
        {{- include "echo.imagePullSecrets" . | nindent 8 }}
      {{- end }}
      containers:
        - name: server
          image: {{ include "echo.image" (dict "registry" .Values.global.imageRegistry "repository" .Values.server.image.repository "tag" .Values.server.image.tag "digest" .Values.server.image.digest) }}
          imagePullPolicy: {{ .Values.server.image.pullPolicy }}
          securityContext:
            {{- if .Values.openshift.enabled }}
            {{- toYaml .Values.openshift.containerSecurityContext | nindent 12 }}
            {{- else }}
            {{- toYaml .Values.server.containerSecurityContext | nindent 12 }}
            {{- end }}
          ports:
            - name: http
              containerPort: {{ .Values.server.service.port }}
          env:
            - name: PORT
              value: {{ .Values.server.service.port | quote }}
            - name: MONGO_URI
              {{- if or .Values.server.mongoUri (not .Values.mongodb.enabled) }}
              value: {{ required "server.mongoUri is required when mongodb.enabled is false" .Values.server.mongoUri | quote }}
              {{- else }}
              value: ""
              {{- end }}
            {{- if and .Values.mongodb.enabled (not .Values.server.mongoUri) }}
            - name: MONGO_HOST
              value: {{ printf "%s-0.%s-headless" (include "echo.mongodbName" .) (include "echo.mongodbName" .) | quote }}
            - name: MONGO_USER
              value: {{ .Values.mongodb.auth.rootUser | quote }}
            - name: MONGO_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ required "mongodb.auth.existingSecret is required when mongodb.enabled is true" .Values.mongodb.auth.existingSecret }}
                  key: mongodb-root-password
            - name: MONGO_REPLICA_SET
              value: {{ .Values.mongodb.replicaSetName | quote }}
            {{- end }}
            - name: CLIENT_ORIGIN
              value: {{ include "echo.clientOrigin" . | quote }}
            - name: S3_ENDPOINT
              value: {{ include "echo.s3Endpoint" . | quote }}
            - name: S3_ACCESS_KEY
              {{- if .Values.minio.enabled }}
              valueFrom:
                secretKeyRef:
                  name: {{ required "minio.existingSecret is required when minio.enabled is true" .Values.minio.existingSecret }}
                  key: rootUser
              {{- else }}
              value: {{ required "server.s3.accessKey is required when minio.enabled is false" .Values.server.s3.accessKey | quote }}
              {{- end }}
            - name: S3_SECRET_KEY
              {{- if .Values.minio.enabled }}
              valueFrom:
                secretKeyRef:
                  name: {{ required "minio.existingSecret is required when minio.enabled is true" .Values.minio.existingSecret }}
                  key: rootPassword
              {{- else }}
              value: {{ required "server.s3.secretKey is required when minio.enabled is false" .Values.server.s3.secretKey | quote }}
              {{- end }}
            - name: S3_BUCKET
              value: {{ .Values.server.s3.bucket | quote }}
            - name: S3_REGION
              value: {{ .Values.server.s3.region | quote }}
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ include "echo.secretName" . }}
                  key: jwt-secret
            - name: RHSSO_ENABLED
              value: {{ .Values.rhsso.enabled | quote }}
            {{- if .Values.rhsso.enabled }}
            - name: RHSSO_URL
              value: {{ required "rhsso.url is required when RHSSO is enabled" .Values.rhsso.url | quote }}
            {{- if .Values.rhsso.backchannelUrl }}
            - name: RHSSO_BACKCHANNEL_URL
              value: {{ .Values.rhsso.backchannelUrl | quote }}
            {{- end }}
            - name: RHSSO_REALM
              value: {{ required "rhsso.realm is required when RHSSO is enabled" .Values.rhsso.realm | quote }}
            - name: RHSSO_CLIENT_ID
              value: {{ required "rhsso.clientId is required when RHSSO is enabled" .Values.rhsso.clientId | quote }}
            {{- if .Values.rhsso.clientSecret }}
            - name: RHSSO_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ include "echo.secretName" . }}
                  key: rhsso-client-secret
            {{- end }}
            - name: RHSSO_USERNAME_CLAIM
              value: {{ .Values.rhsso.usernameClaim | quote }}
            - name: RHSSO_DISPLAY_NAME_CLAIM
              value: {{ .Values.rhsso.displayNameClaim | quote }}
            {{- if .Values.rhsso.redirectUri }}
            - name: RHSSO_REDIRECT_URI
              value: {{ .Values.rhsso.redirectUri | quote }}
            {{- end }}
            {{- if .Values.rhsso.extraCaCertConfigMap }}
            - name: NODE_EXTRA_CA_CERTS
              value: "/etc/ssl/certs/extra-ca.pem"
            {{- else }}
            - name: NODE_TLS_REJECT_UNAUTHORIZED
              value: "0"
            {{- end }}
            {{- end }}
            {{- with .Values.server.extraEnv }}{{ toYaml . | nindent 12 }}{{- end }}
          readinessProbe:
            httpGet: { path: /api/health, port: http }
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet: { path: /api/health, port: http }
            initialDelaySeconds: 30
            periodSeconds: 20
          resources: {{- toYaml .Values.server.resources | nindent 12 }}
          volumeMounts:
            {{- if .Values.rhsso.extraCaCertConfigMap }}
            - name: extra-ca-cert
              mountPath: /etc/ssl/certs/extra-ca.pem
              subPath: extra-ca.pem
            {{- end }}
      volumes:
        {{- if .Values.rhsso.extraCaCertConfigMap }}
        - name: extra-ca-cert
          configMap:
            name: {{ .Values.rhsso.extraCaCertConfigMap }}
            items:
              - key: extra-ca.pem
                path: extra-ca.pem
        {{- end }}
