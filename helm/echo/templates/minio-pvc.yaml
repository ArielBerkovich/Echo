{{- if and .Values.minio.enabled .Values.minio.persistence.enabled }}
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "echo.minioName" . }}-data
  labels:
    {{- include "echo.labels" . | nindent 4 }}
    app.kubernetes.io/component: minio
  {{- with .Values.minio.persistence.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  accessModes:
    {{- toYaml .Values.minio.persistence.accessModes | nindent 4 }}
  resources:
    requests:
      storage: {{ .Values.minio.persistence.size }}
  {{- with .Values.global.storageClassName }}
  storageClassName: {{ . }}
  {{- end }}
{{- end }}
