global:
  # Prefix for Echo and Bitnami images. For Artifactory, keep the hostname here
  # and put the Artifactory repository path in each image.repository value.
  imageRegistry: ""
  # Secret names (not objects). Echo converts these to Kubernetes
  # imagePullSecrets entries and the Bitnami MongoDB chart consumes them too.
  imagePullSecrets: []
  # Used by the Bitnami MongoDB chart.
  defaultStorageClass: ""
  # Kept for backwards compatibility with earlier Echo chart values.
  storageClassName: ""
  security:
    # Set true only when mirrored Bitnami images use a different repository
    # name. This disables Bitnami's image-name verification, not TLS.
    allowInsecureImages: false
  compatibility:
    openshift:
      # auto detects OpenShift; force is useful when rendering manifests away
      # from the target cluster. MongoDB removes fixed UID/GID values.
      adaptSecurityContext: auto

# Echo workload security profile. Enabling it removes fixed UID/GID values and
# lets OpenShift restricted-v2 assign IDs from the namespace's allowed ranges.
openshift:
  enabled: false
  podSecurityContext:
    runAsNonRoot: true
    seccompProfile:
      type: RuntimeDefault
  containerSecurityContext:
    runAsNonRoot: true
    allowPrivilegeEscalation: false
    capabilities:
      drop: [ALL]

server:
  image:
    repository: arielber/echo-server
    tag: "latest"
    digest: ""
    pullPolicy: IfNotPresent
  replicaCount: 1
  service:
    type: ClusterIP
    port: 4000
  clientOrigin: ""
  mongoUri: ""
  # Pre-install hook Secret consumed by the Echo server.
  existingSecret: echo-secret
  jwtSecret: ""
  s3:
    endpoint: ""
    accessKey: ""
    secretKey: ""
    bucket: echo-uploads
    region: us-east-1
  resources:
    requests:
      cpu: 512m
      memory: 2Gi
    limits:
      memory: 2Gi
  podSecurityContext:
    runAsUser: 1000
    runAsGroup: 1000
    runAsNonRoot: true
  containerSecurityContext:
    runAsNonRoot: true
    allowPrivilegeEscalation: false
    capabilities:
      drop: [ALL]
    seccompProfile:
      type: RuntimeDefault
  extraEnv: []

# Red Hat SSO / Keycloak OpenID Connect login. The client may be public
# (recommended with PKCE; leave clientSecret empty) or confidential.
rhsso:
  enabled: false
  # Base server URL, including /auth on older RHSSO releases when applicable.
  url: ""
  # Optional server-only URL when RHSSO is reached differently inside the cluster.
  backchannelUrl: ""
  realm: ""
  clientId: ""
  clientSecret: ""
  # Name of an existing ConfigMap containing the extra CA cert.
  extraCaCertConfigMap: ""
  # Standard OIDC defaults. Dot-separated nested claim paths are supported.
  usernameClaim: preferred_username
  displayNameClaim: name
  # Normally derived as <Echo public URL>/api/auth/rhsso/callback.
  redirectUri: ""

client:
  image:
    repository: arielber/echo-client
    tag: "latest"
    digest: ""
    pullPolicy: IfNotPresent
  replicaCount: 1
  service:
    type: ClusterIP
    port: 80
  ingress:
    enabled: false
    className: ""
    annotations: {}
    hosts:
      - host: echo.local
        paths:
          - path: /
            pathType: Prefix
    tls: []
  # OpenShift Route. Leave disabled for ordinary Kubernetes. The host is
  # required when enabled because Echo uses it as its CORS client origin.
  route:
    enabled: false
    host: ""
    annotations: {}
    tls:
      termination: edge
      insecureEdgeTerminationPolicy: Redirect
  resources:
    requests:
      cpu: 25m
      memory: 256Mi
    limits:
      memory: 256Mi
  podSecurityContext:
    runAsUser: 101
    runAsGroup: 101
    runAsNonRoot: true
  containerSecurityContext:
    runAsNonRoot: true
    allowPrivilegeEscalation: false
    capabilities:
      drop: [ALL]
    seccompProfile:
      type: RuntimeDefault
  extraEnv: []

mongodb:
  enabled: true
  image:
    registry: registry-1.docker.io
    repository: bitnami/mongodb
    tag: "latest"
    digest: ""
    pullPolicy: IfNotPresent
    pullSecrets: []
  architecture: replicaset
  replicaCount: 1
  replicaSetName: rs0
  auth:
    enabled: true
    rootUser: echo
    # Created by the parent chart's pre-install hook. Setting this also stops
    # the MongoDB subchart from generating its own credentials Secret.
    existingSecret: echo-mongodb-secret
    rootPassword: ""
    replicaSetKey: ""
  persistence:
    enabled: true
    size: 8Gi
    storageClass: ""
  # Be explicit instead of relying on the Kubernetes StatefulSet default.
  persistentVolumeClaimRetentionPolicy:
    enabled: true
    whenDeleted: Retain
    whenScaled: Retain
  resources: {}

minio:
  enabled: true
  image:
    repository: quay.io/minio/minio
    tag: "RELEASE.2024-12-18T13-15-44Z"
    pullPolicy: IfNotPresent
  mcImage:
    repository: quay.io/minio/mc
    tag: "RELEASE.2024-11-21T17-21-54Z"
    pullPolicy: IfNotPresent
  imagePullSecrets: []
  mode: standalone
  # Created by the parent chart's pre-install hook. The MinIO subchart reads
  # rootUser and rootPassword from this Secret instead of creating its own.
  existingSecret: echo-minio-secret
  rootUser: ""
  rootPassword: ""
  persistence:
    enabled: true
    size: 8Gi
    storageClass: ""
    # The standalone MinIO chart creates a Helm-managed PVC. Keep it when the
    # release is uninstalled so a later install can reuse the stored objects.
    annotations:
      helm.sh/resource-policy: keep
  buckets:
    - name: echo-uploads
      policy: none
      purge: false
  # The upstream chart defaults to a 16Gi memory request. These values are
  # suitable for a small development cluster; increase them for production.
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 1
      memory: 1Gi
  securityContext:
    # For OpenShift restricted-v2 set enabled=false. The SCC then injects an
    # allowed UID, GID, fsGroup, seccomp profile, and capability restrictions.
    enabled: true
    runAsUser: 1000
    runAsGroup: 1000
    fsGroup: 1000
    fsGroupChangePolicy: OnRootMismatch
    runAsNonRoot: true
  containerSecurityContext:
    runAsNonRoot: true
    allowPrivilegeEscalation: false
    capabilities:
      drop: [ALL]
    readOnlyRootFilesystem: false
  makeBucketJob:
    securityContext:
      # Set enabled=false on OpenShift so the setup container gets SCC defaults.
      enabled: true
      runAsUser: 1000
      runAsGroup: 1000
      fsGroup: 1000
    containerSecurityContext:
      runAsUser: 1000
      runAsGroup: 1000
      runAsNonRoot: true
      allowPrivilegeEscalation: false
      capabilities:
        drop: [ALL]
  makePolicyJob:
    securityContext:
      enabled: true
      runAsUser: 1000
      runAsGroup: 1000
      fsGroup: 1000
    containerSecurityContext:
      runAsUser: 1000
      runAsGroup: 1000
      runAsNonRoot: true
      allowPrivilegeEscalation: false
      capabilities:
        drop: [ALL]
  makeUserJob:
    securityContext:
      enabled: true
      runAsUser: 1000
      runAsGroup: 1000
      fsGroup: 1000
    containerSecurityContext:
      runAsUser: 1000
      runAsGroup: 1000
      runAsNonRoot: true
      allowPrivilegeEscalation: false
      capabilities:
        drop: [ALL]
  makeServiceAccountJob:
    securityContext:
      enabled: true
      runAsUser: 1000
      runAsGroup: 1000
      fsGroup: 1000
    containerSecurityContext:
      runAsUser: 1000
      runAsGroup: 1000
      runAsNonRoot: true
      allowPrivilegeEscalation: false
      capabilities:
        drop: [ALL]
  postJob:
    securityContext:
      # Set enabled=false on OpenShift.
      enabled: true
      runAsUser: 1000
      runAsGroup: 1000
      fsGroup: 1000
